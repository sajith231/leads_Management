{% extends "base.html" %}

{% block title %}Enquiry Form{% endblock %}

{% block content %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Display:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --border:    #dde3ea;
      --accent:    #1a6fc4;
      --accent-dk: #145499;
      --accent-lt: #e8f0fb;
      --text:      #1e2a38;
      --muted:     #6b7a8d;
      --success:   #1e7d45;
      --error:     #c0392b;
      --shadow:    0 4px 24px rgba(30,42,56,.09), 0 1px 4px rgba(30,42,56,.06);
    }
    body {
      background: var(--bg);
      font-family: 'Google Sans', sans-serif;
      color: var(--text);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(26,111,196,.07) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 90%, rgba(26,111,196,.05) 0%, transparent 50%);
      pointer-events: none;
    }
    .enquiry-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      width: 100%;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
      padding: 1.8rem 2.2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: -20px; left: -20px;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
    }
    .card-header h1 {
      font-family: 'Google Sans Display', 'Google Sans', sans-serif;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: .01em;
      line-height: 1.25;
      position: relative;
      z-index: 1;
    }
    .card-header p {
      margin-top: .3rem;
      color: rgba(255,255,255,.8);
      font-size: .82rem;
      font-weight: 400;
      letter-spacing: .02em;
      position: relative;
      z-index: 1;
    }
    .card-body { padding: 1.8rem 2.2rem 2.2rem; }
    .field {
      margin-bottom: 1.25rem;
      animation: rise .5s cubic-bezier(.22,1,.36,1) both;
    }
    .field:nth-child(1) { animation-delay: .07s; }
    .field:nth-child(2) { animation-delay: .13s; }
    .field:nth-child(3) { animation-delay: .19s; }
    .field:nth-child(4) { animation-delay: .25s; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: capitalize;
      color: #303133;
      margin-bottom: .4rem;
    }
    label span.req { color: var(--accent); margin-left: 2px; }
    input, textarea {
      width: 100%;
      padding: .68rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: #fafbfc;
      font-family: 'Google Sans', sans-serif;
      font-size: .9rem;
      color: var(--text);
      transition: border-color .18s, box-shadow .18s, background .18s;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: #b0bac6; }
    input:focus, textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26,111,196,.12);
    }
    textarea { resize: vertical; min-height: 96px; line-height: 1.6; }
    .inline-fields {
      display: flex;
      gap: .6rem;
    }
    .inline-fields .field {
      flex: 1;
      margin-bottom: 0;
    }
    .location-wrap {
      display: flex;
      gap: .5rem;
      align-items: stretch;
    }
    .location-wrap input { flex: 1; }
    .btn-locate {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .68rem .9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Google Sans', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background .18s, transform .12s, box-shadow .18s;
      box-shadow: 0 2px 8px rgba(26,111,196,.25);
    }
    .btn-locate:hover { background: var(--accent-dk); box-shadow: 0 4px 14px rgba(26,111,196,.35); }
    .btn-locate:active { transform: scale(.97); }
    .btn-locate:disabled { background: #a0aab6; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-locate svg { flex-shrink: 0; }
    .loc-status {
      display: none;
      margin-top: .35rem;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .02em;
    }
    .loc-status.fetching { display: flex; align-items: center; gap: .4rem; color: var(--muted); }
    .loc-status.error    { display: block; color: var(--error); }
    .loc-status.ok       { display: flex; align-items: center; gap: .4rem; color: var(--success); }
    .coord-link {
      color: var(--accent);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px dashed var(--accent);
      transition: color .15s;
    }
    .coord-link:hover { color: var(--accent-dk); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; display: inline-block; }
    .combo-trigger {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      background: #fafbfc;
      transition: border-color .18s, box-shadow .18s, background .18s;
      overflow: hidden;
    }
    .combo-trigger.focused {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26,111,196,.12);
    }
    .combo-trigger input {
      flex: 1;
      border: none !important;
      box-shadow: none !important;
      background: transparent;
      padding: .68rem .9rem;
      font-size: .9rem;
      outline: none;
    }
    .combo-chevron {
      padding: 0 .85rem;
      cursor: pointer;
      color: var(--muted);
      font-size: .72rem;
      user-select: none;
      transition: transform .2s, color .15s;
      line-height: 1;
    }
    .combo-chevron.open { transform: rotate(180deg); color: var(--accent); }
    #comboPortal {
      display: none;
      position: fixed;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(30,42,56,.15);
      z-index: 9999;
      overflow-y: auto;
      max-height: 210px;
    }
    #comboPortal.open { display: block; }
    .combo-option {
      padding: .6rem .9rem;
      font-size: .875rem;
      color: var(--text);
      cursor: pointer;
      transition: background .1s, color .1s;
    }
    .combo-option:hover { background: var(--accent-lt); color: var(--accent); }
    .combo-option.no-match {
      color: var(--muted);
      font-style: italic;
      cursor: default;
      pointer-events: none;
    }
    .actions {
      display: flex;
      gap: .75rem;
      margin-top: 1.8rem;
      animation: rise .5s .3s cubic-bezier(.22,1,.36,1) both;
    }
    .btn {
      flex: 1;
      padding: .75rem 1rem;
      font-family: 'Google Sans', sans-serif;
      font-size: .875rem;
      font-weight: 600;
      letter-spacing: .03em;
      border-radius: 8px;
      cursor: pointer;
      transition: background .18s, color .18s, transform .12s, box-shadow .18s;
      border: none;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      isolation: isolate;
    }
    .btn:active { transform: scale(.98); }
    .btn-submit {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 3px 12px rgba(26,111,196,.3);
    }
    .btn-submit:hover {
      background: var(--accent-dk);
      box-shadow: 0 5px 18px rgba(26,111,196,.4);
    }
    .btn-cancel {
      background: #fff;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-cancel:hover { background: #f4f6f9; color: var(--text); border-color: #c5cdd7; }
    .btn-label {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }
    .btn-cancel .btn-label { color: var(--muted); }
    .btn-submit .btn-label { color: #fff; }
    .btn::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--text);
      color: #fff;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .04em;
      white-space: nowrap;
      padding: .3rem .6rem;
      border-radius: 5px;
      pointer-events: none;
      visibility: hidden;
      opacity: 0;
      transition: opacity .18s, transform .18s;
      z-index: 10;
    }
    .btn::before {
      content: '';
      position: absolute;
      bottom: calc(100% + 3px);
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--text);
      pointer-events: none;
      visibility: hidden;
      opacity: 0;
      transition: opacity .18s;
      z-index: 10;
    }
    .btn:hover::after {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .btn:hover::before {
      visibility: visible;
      opacity: 1;
    }
    @media (max-width: 520px) {
      .card-header, .card-body { padding-left: 1.4rem; padding-right: 1.4rem; }
      .actions { flex-direction: column-reverse; }
      .btn-cancel .btn-label { color: var(--text); }
      .inline-fields { flex-direction: column; gap: 0; }
      .inline-fields .field { margin-bottom: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="enquiry-wrapper">
  <div class="card">
    <div class="card-header">
      <h1>Enquiry Form</h1>
      <p>Fill in the details below and we'll get back to you shortly.</p>
    </div>

    <div class="card-body">
      <form method="POST" action="{% url 'enquiry_form' %}">
        {% csrf_token %}

        <div class="inline-fields" style="margin-bottom:1.25rem;">
          <div class="field">
            <label for="ownerName">Owner Name <span class="req">*</span></label>
            <input type="text" id="ownerName" name="ownerName" placeholder="e.g. Rajan K." required />
          </div>
          <div class="field">
            <label for="shopName">Shop Name <span class="req">*</span></label>
            <input type="text" id="shopName" name="shopName" placeholder="e.g. Sunrise General Store" required />
          </div>
          <div class="field">
            <label for="phoneNumber">Phone Number</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="e.g. +91 98765 43210" />
          </div>
        </div>

        <div class="field">
          <label for="location">Location <span class="req">*</span></label>
          <div class="location-wrap">
            <input type="text" id="location" name="location" placeholder="e.g. Kozhikode, Kerala" required />
            <button type="button" class="btn-locate" id="btnLocate" title="Detect my location">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" opacity=".25"/>
              </svg>
              Detect
            </button>
          </div>
          <div class="loc-status" id="locStatus"></div>
        </div>
        <input type="hidden" id="latitude"  name="latitude" />
        <input type="hidden" id="longitude" name="longitude" />

        <div class="field">
          <label>Purpose <span class="req">*</span></label>
          <div class="combo-trigger" id="comboTrigger">
            <input type="text" id="purposeInput" name="purpose" placeholder="Type or select a purpose…" autocomplete="off" required />
            <span class="combo-chevron" id="comboChevron">▼</span>
          </div>
        </div>

        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Any additional information or requests…"></textarea>
        </div>

        <div class="actions">
          <a href="{% url 'enquiry_list' %}" class="btn btn-cancel" data-label="Go back to list">
            <span class="btn-label">Cancel</span>
          </a>
          <button type="submit" class="btn btn-submit" data-label="Submit this enquiry">
            <span class="btn-label">Submit</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="comboPortal">
  <div class="combo-option" data-value="Product Enquiry">Product Enquiry</div>
  <div class="combo-option" data-value="Quotation">Quotation</div>
  <div class="combo-option" data-value="Pricing">Pricing</div>
  <div class="combo-option" data-value="Complaint">Complaint</div>
  <div class="combo-option" data-value="Service Request">Service Request</div>
  <div class="combo-option" data-value="Other">Other</div>
</div>

<script>
  const purposeInput = document.getElementById('purposeInput');
  const comboTrigger = document.getElementById('comboTrigger');
  const comboChevron = document.getElementById('comboChevron');
  const portal       = document.getElementById('comboPortal');
  const allOptions   = Array.from(portal.querySelectorAll('.combo-option[data-value]'));
  let isOpen = false;

  function positionPortal() {
    const rect = comboTrigger.getBoundingClientRect();
    portal.style.left  = rect.left + 'px';
    portal.style.top   = (rect.bottom + 4) + 'px';
    portal.style.width = rect.width + 'px';
  }
  function openDropdown() {
    positionPortal();
    portal.classList.add('open');
    comboChevron.classList.add('open');
    comboTrigger.classList.add('focused');
    isOpen = true;
    filterOptions();
  }
  function closeDropdown() {
    portal.classList.remove('open');
    comboChevron.classList.remove('open');
    comboTrigger.classList.remove('focused');
    isOpen = false;
  }
  function filterOptions() {
    const q = purposeInput.value.trim().toLowerCase();
    let anyVisible = false;
    allOptions.forEach(opt => {
      const match = !q || opt.textContent.trim().toLowerCase().includes(q);
      opt.style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    });
    let noMatch = portal.querySelector('.no-match');
    if (!anyVisible) {
      if (!noMatch) {
        noMatch = document.createElement('div');
        noMatch.className = 'combo-option no-match';
        noMatch.textContent = 'No match — your typed text will be used';
        portal.appendChild(noMatch);
      }
      noMatch.style.display = '';
    } else if (noMatch) {
      noMatch.style.display = 'none';
    }
  }
  purposeInput.addEventListener('focus', openDropdown);
  purposeInput.addEventListener('input', () => { if (!isOpen) openDropdown(); else filterOptions(); });
  comboChevron.addEventListener('mousedown', e => {
    e.preventDefault();
    isOpen ? closeDropdown() : (purposeInput.focus(), openDropdown());
  });
  portal.addEventListener('mousedown', e => {
    const opt = e.target.closest('.combo-option[data-value]');
    if (opt) {
      purposeInput.value = opt.textContent.trim();
      closeDropdown();
      e.preventDefault();
    }
  });
  document.addEventListener('click', e => {
    if (!comboTrigger.contains(e.target) && !portal.contains(e.target)) closeDropdown();
  });
  // ── Auto-location ──────────────────────────────────────────────
  const btnLocate   = document.getElementById('btnLocate');
  const locInput    = document.getElementById('location');
  const locStatus   = document.getElementById('locStatus');
  const latInput    = document.getElementById('latitude');
  const lngInput    = document.getElementById('longitude');

  function setStatus(type, html) {
    locStatus.className = 'loc-status ' + type;
    locStatus.innerHTML = html;
  }

  // Clear coords if user manually edits the location text
  locInput.addEventListener('input', () => {
    latInput.value = '';
    lngInput.value = '';
    if (locStatus.classList.contains('ok')) {
      locStatus.className = 'loc-status';
      locStatus.innerHTML = '';
    }
  });

  btnLocate.addEventListener('click', () => {
    if (!navigator.geolocation) {
      setStatus('error', 'Geolocation is not supported by your browser.');
      return;
    }
    btnLocate.disabled = true;
    setStatus('fetching', '<span class="spin">⟳</span> Detecting your location…');

    navigator.geolocation.getCurrentPosition(
      async ({ coords }) => {
        const { latitude, longitude } = coords;

        // Store precise coords in hidden fields
        latInput.value = latitude;
        lngInput.value = longitude;

        try {
          const res  = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`,
            { headers: { 'Accept-Language': 'en' } }
          );
          const data = await res.json();
          const a    = data.address || {};

          const city  = a.city || a.town || a.village || a.county || '';
          const state = a.state || '';
          const parts = [city, state].filter(Boolean);
          const label = parts.length ? parts.join(', ') : data.display_name;

          locInput.value = label;
          const mapsUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;
          setStatus('ok',
            `✔ Location detected &nbsp;` +
            `<a href="${mapsUrl}" target="_blank" rel="noopener" class="coord-link">` +
            ` ${latitude.toFixed(5)}, ${longitude.toFixed(5)}</a>`
          );
        } catch {
          locInput.value = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
          const mapsUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;
          setStatus('ok',
            `✔ Coordinates captured &nbsp;` +
            `<a href="${mapsUrl}" target="_blank" rel="noopener" class="coord-link">` +
            ` ${latitude.toFixed(5)}, ${longitude.toFixed(5)}</a>`
          );
        }
        btnLocate.disabled = false;
      },
      (err) => {
        const msgs = {
          1: 'Location access denied. Please allow it in your browser settings.',
          2: 'Location unavailable. Try again or type manually.',
          3: 'Request timed out. Try again.',
        };
        setStatus('error', msgs[err.code] || 'Unknown error. Please type manually.');
        btnLocate.disabled = false;
      },
      { timeout: 10000, maximumAge: 60000 }
    );
  });

</script>
</body>
{% endblock %}
